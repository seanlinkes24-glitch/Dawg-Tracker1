<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dawg Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0c0f;
    --surface: #111418;
    --surface2: #181c22;
    --border: #232830;
    --text: #e8eaed;
    --muted: #5a6270;
    --accent: #f0b429;
    --green: #22c55e;
    --yellow: #f0b429;
    --red: #ef4444;
    --gray: #3f4754;
    --watch: #3b82f6;
    --alert: #f0b429;
    --ready: #22c55e;
    --pass: #3f4754;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 20px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 3px; color: var(--accent); }
  .logo span { color: var(--muted); font-size: 13px; font-family: 'Space Mono', monospace; display: block; letter-spacing: 2px; margin-top: -4px; }
  .header-right { display: flex; align-items: center; gap: 16px; }
  .stat-pill { background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 6px 14px; font-family: 'Space Mono', monospace; font-size: 11px; color: var(--muted); text-align:center; }
  .stat-pill strong { color: var(--accent); font-size: 15px; display: block; }
  .btn-add { background: var(--accent); color: #000; border: none; border-radius: 6px; padding: 10px 20px; font-family: 'Space Mono', monospace; font-size: 12px; font-weight: 700; cursor: pointer; letter-spacing: 1px; transition: opacity 0.15s; }
  .btn-add:hover { opacity: 0.85; }

  .sync-bar { background: var(--surface2); border-bottom: 1px solid var(--border); padding: 8px 32px; display: flex; align-items: center; gap: 10px; font-family: 'Space Mono', monospace; font-size: 11px; color: var(--muted); }
  .sync-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); }
  .sync-dot.synced { background: var(--green); }
  .sync-dot.syncing { background: var(--yellow); animation: pulse 1s infinite; }
  .sync-dot.error { background: var(--red); }
  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.3; } }
  .btn-sync { margin-left: auto; background: transparent; border: 1px solid var(--border); border-radius: 4px; padding: 4px 12px; color: var(--muted); font-family: 'Space Mono', monospace; font-size: 10px; cursor: pointer; transition: all 0.15s; }
  .btn-sync:hover { border-color: var(--accent); color: var(--accent); }

  .filters { padding: 16px 32px; display: flex; gap: 8px; border-bottom: 1px solid var(--border); background: var(--surface); flex-wrap: wrap; }
  .filter-btn { background: transparent; border: 1px solid var(--border); border-radius: 20px; padding: 6px 16px; font-family: 'DM Sans', sans-serif; font-size: 13px; color: var(--muted); cursor: pointer; transition: all 0.15s; display: flex; align-items: center; gap: 6px; }
  .filter-btn:hover { border-color: var(--accent); color: var(--text); }
  .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #000; font-weight: 500; }
  .filter-dot { width: 7px; height: 7px; border-radius: 50%; }

  main { padding: 24px 32px; max-width: 1400px; margin: 0 auto; }
  .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 16px; }

  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; transition: transform 0.15s, border-color 0.15s; animation: fadeIn 0.3s ease; position: relative; }
  @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
  .card:hover { transform: translateY(-2px); border-color: #2e3540; }
  .card::before { content:''; position:absolute; left:0; top:0; bottom:0; width:3px; border-radius:10px 0 0 10px; }
  .card[data-status="WATCH"]::before { background: var(--watch); }
  .card[data-status="ALERT"]::before { background: var(--alert); }
  .card[data-status="READY"]::before { background: var(--ready); }
  .card[data-status="PASS"]::before  { background: var(--gray); }

  .card-header { padding: 14px 16px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); }
  .ticker { font-family: 'Bebas Neue', sans-serif; font-size: 26px; letter-spacing: 2px; line-height: 1; }
  .price { font-family: 'Space Mono', monospace; font-size: 18px; color: var(--accent); font-weight: 700; }
  .status-badge { display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px; border-radius: 4px; font-size: 11px; font-family: 'Space Mono', monospace; font-weight: 700; letter-spacing: 1px; }
  .status-dot { width: 6px; height: 6px; border-radius: 50%; }
  .status-WATCH { background: rgba(59,130,246,0.15); color: var(--watch); }
  .status-ALERT { background: rgba(240,180,41,0.15); color: var(--alert); }
  .status-READY { background: rgba(34,197,94,0.15); color: var(--ready); }
  .status-PASS  { background: rgba(63,71,84,0.3); color: var(--muted); }
  .dot-WATCH { background: var(--watch); }
  .dot-ALERT { background: var(--alert); }
  .dot-READY { background: var(--ready); }
  .dot-PASS  { background: var(--muted); }

  .card-body { padding: 14px 16px; }
  .metrics-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 12px; }
  .metric { background: var(--surface2); border-radius: 6px; padding: 8px 10px; }
  .metric-label { font-size: 10px; color: var(--muted); font-family: 'Space Mono', monospace; letter-spacing: 0.5px; margin-bottom: 3px; }
  .metric-value { font-family: 'Space Mono', monospace; font-size: 13px; color: var(--text); font-weight: 700; }
  .metric-value.green { color: var(--green); }
  .metric-value.yellow { color: var(--yellow); }
  .metric-value.red { color: var(--red); }

  .phase-row { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
  .phase-label { font-size: 11px; color: var(--muted); font-family: 'Space Mono', monospace; white-space: nowrap; }
  .phase-track { flex: 1; display: flex; gap: 3px; }
  .phase-seg { flex: 1; height: 4px; border-radius: 2px; background: var(--border); }
  .phase-seg.active { background: var(--accent); }
  .phase-name { font-size: 11px; font-family: 'Space Mono', monospace; color: var(--accent); white-space: nowrap; }

  .ema-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .ema-tag { font-size: 11px; font-family: 'Space Mono', monospace; padding: 3px 8px; border-radius: 4px; }
  .ema-above { background: rgba(34,197,94,0.15); color: var(--green); }
  .ema-below { background: rgba(239,68,68,0.15); color: var(--red); }
  .score-display { display: flex; align-items: center; gap: 4px; }
  .score-pip { width: 18px; height: 18px; border-radius: 50%; background: var(--border); display: flex; align-items: center; justify-content: center; font-size: 9px; }
  .score-pip.filled { background: var(--accent); }

  .notes-area { background: var(--surface2); border-radius: 6px; padding: 8px 10px; font-size: 12px; color: var(--muted); line-height: 1.5; min-height: 36px; margin-bottom: 12px; font-style: italic; }
  .dates-row { display: flex; justify-content: space-between; font-size: 11px; color: var(--muted); font-family: 'Space Mono', monospace; margin-bottom: 12px; }

  .card-actions { display: flex; gap: 6px; padding: 10px 16px; border-top: 1px solid var(--border); background: var(--surface2); }
  .btn-action { flex: 1; background: transparent; border: 1px solid var(--border); border-radius: 5px; padding: 6px; font-family: 'Space Mono', monospace; font-size: 10px; color: var(--muted); cursor: pointer; transition: all 0.15s; letter-spacing: 0.5px; }
  .btn-action:hover { border-color: var(--accent); color: var(--accent); }
  .btn-action.danger:hover { border-color: var(--red); color: var(--red); }

  .empty-state { text-align: center; padding: 80px 20px; color: var(--muted); grid-column: 1/-1; }
  .empty-state .big { font-family: 'Bebas Neue', sans-serif; font-size: 48px; color: var(--border); letter-spacing: 4px; }
  .empty-state p { font-size: 14px; margin-top: 8px; }

  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 200; align-items: center; justify-content: center; padding: 20px; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; width: 100%; max-width: 520px; max-height: 90vh; overflow-y: auto; }
  .modal-header { padding: 20px 24px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .modal-title { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 2px; color: var(--accent); }
  .btn-close { background: transparent; border: none; color: var(--muted); font-size: 20px; cursor: pointer; line-height: 1; padding: 2px 6px; }
  .btn-close:hover { color: var(--text); }
  .modal-body { padding: 20px 24px; }
  .form-row { margin-bottom: 14px; }
  .form-row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 14px; }
  .form-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 14px; }
  label { display: block; font-size: 11px; font-family: 'Space Mono', monospace; color: var(--muted); letter-spacing: 1px; margin-bottom: 5px; }
  input, select, textarea { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 9px 12px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px; outline: none; transition: border-color 0.15s; }
  input:focus, select:focus, textarea:focus { border-color: var(--accent); }
  textarea { resize: vertical; min-height: 70px; }
  select option { background: var(--surface2); }
  .modal-footer { padding: 16px 24px; border-top: 1px solid var(--border); display: flex; gap: 10px; justify-content: flex-end; }
  .btn-cancel { background: transparent; border: 1px solid var(--border); border-radius: 6px; padding: 9px 20px; color: var(--muted); font-family: 'Space Mono', monospace; font-size: 12px; cursor: pointer; transition: all 0.15s; }
  .btn-cancel:hover { border-color: var(--text); color: var(--text); }
  .btn-save { background: var(--accent); border: none; border-radius: 6px; padding: 9px 24px; color: #000; font-family: 'Space Mono', monospace; font-size: 12px; font-weight: 700; cursor: pointer; transition: opacity 0.15s; }
  .btn-save:hover { opacity: 0.85; }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  @media (max-width: 600px) {
    header { padding: 14px 16px; flex-wrap: wrap; gap: 10px; }
    .filters { padding: 12px 16px; }
    main { padding: 16px; }
    .cards-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <div>
    <div class="logo">DAWG TRACKER <span>DARVAS · WYCKOFF · MTT</span></div>
  </div>
  <div class="header-right">
    <div class="stat-pill"><strong id="stat-total">0</strong>TOTAL</div>
    <div class="stat-pill"><strong id="stat-ready">0</strong>READY</div>
    <div class="stat-pill"><strong id="stat-alert">0</strong>ALERT</div>
    <button class="btn-add" onclick="openModal()">+ ADD STOCK</button>
  </div>
</header>

<div class="sync-bar">
  <div class="sync-dot" id="sync-dot"></div>
  <span id="sync-status">Connecting to Google Sheets...</span>
  <button class="btn-sync" onclick="loadStocks()">↻ REFRESH</button>
</div>

<div class="filters">
  <button class="filter-btn active" onclick="setFilter('ALL', this)">ALL</button>
  <button class="filter-btn" onclick="setFilter('READY', this)"><span class="filter-dot" style="background:var(--ready)"></span> READY</button>
  <button class="filter-btn" onclick="setFilter('ALERT', this)"><span class="filter-dot" style="background:var(--alert)"></span> ALERT</button>
  <button class="filter-btn" onclick="setFilter('WATCH', this)"><span class="filter-dot" style="background:var(--watch)"></span> WATCH</button>
  <button class="filter-btn" onclick="setFilter('PASS', this)"><span class="filter-dot" style="background:var(--gray)"></span> PASS</button>
</div>

<main>
  <div class="cards-grid" id="cards-grid">
    <div class="empty-state">
      <div class="big">LOADING</div>
      <p>Fetching your stocks from Google Sheets...</p>
    </div>
  </div>
</main>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modal-title">ADD STOCK</div>
      <button class="btn-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-row-2">
        <div><label>TICKER</label><input type="text" id="f-ticker" placeholder="AXTI" style="text-transform:uppercase"></div>
        <div><label>CURRENT PRICE</label><input type="number" id="f-price" placeholder="0.00" step="0.01"></div>
      </div>
      <div class="form-row-3">
        <div><label>BOX LOW $</label><input type="number" id="f-box-low" placeholder="0.00" step="0.01"></div>
        <div><label>BOX HIGH $</label><input type="number" id="f-box-high" placeholder="0.00" step="0.01"></div>
        <div><label>20D SLOPE %</label><input type="number" id="f-slope" placeholder="1.8" step="0.1"></div>
      </div>
      <div class="form-row-2">
        <div><label>DAWG THRUST DATE</label><input type="date" id="f-thrust-date"></div>
        <div><label>NEXT CHECK DATE</label><input type="date" id="f-next-check"></div>
      </div>
      <div class="form-row-2">
        <div><label>13 EMA POSITION</label>
          <select id="f-ema">
            <option value="above">Above 13 EMA ✅</option>
            <option value="below">Below 13 EMA ❌</option>
          </select>
        </div>
        <div><label>CONVICTION SCORE</label>
          <select id="f-score">
            <option value="3">3/3 — Active List</option>
            <option value="2">2/3 — Bench List</option>
            <option value="1">1/3 — Watch Only</option>
            <option value="0">0/3 — Skip</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <label>WYCKOFF PHASE</label>
        <select id="f-phase">
          <option value="0">Fresh Consolidation — Just off thrust</option>
          <option value="1">Mid Box — Tightening, building</option>
          <option value="2">Breakout Ready — Box nearly complete</option>
          <option value="3">Breaking Out — Entry now</option>
          <option value="4">Extended — Too late, markup mature</option>
        </select>
      </div>
      <div class="form-row">
        <label>STATUS</label>
        <select id="f-status">
          <option value="WATCH">🔵 WATCH — Not ready yet</option>
          <option value="ALERT">🟡 ALERT — Getting close</option>
          <option value="READY">🟢 READY — Breakout imminent</option>
          <option value="PASS">⚫ PASS — Extended or broken</option>
        </select>
      </div>
      <div class="form-row">
        <label>NOTES</label>
        <textarea id="f-notes" placeholder="What are you watching for on this setup..."></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal()">CANCEL</button>
      <button class="btn-save" onclick="saveStock()">SAVE STOCK</button>
    </div>
  </div>
</div>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbySm4CAE2O4dLmwMB4qp3syHv42CmecNnc2jauq3B7w_iSCQW3ysbvdku3815Y7zcVB/exec';

const PHASES = ['Fresh Consolidation','Mid Box','Breakout Ready','Breaking Out','Extended'];

let stocks = JSON.parse(localStorage.getItem('dawg-stocks') || '[]');
let editingId = null;
let currentFilter = 'ALL';

function setSyncStatus(state, msg) {
  const dot = document.getElementById('sync-dot');
  const txt = document.getElementById('sync-status');
  dot.className = 'sync-dot ' + state;
  txt.textContent = msg;
}

function saveLocal() {
  localStorage.setItem('dawg-stocks', JSON.stringify(stocks));
}

function loadStocks() {
  render();
  setSyncStatus('syncing', 'Syncing with Google Sheets...');
  window.__dawgCb = function(data) {
    const remote = data.filter(s => s.id);
    if (remote.length > 0) {
      stocks = remote;
      saveLocal();
      render();
    }
    setSyncStatus('synced', 'Synced — ' + new Date().toLocaleTimeString());
  };
  const old = document.getElementById('__dawgScript');
  if (old) old.remove();
  const s = document.createElement('script');
  s.id = '__dawgScript';
  s.async = true;
  s.crossOrigin = 'anonymous';
  s.src = API_URL + '?callback=__dawgCb&t=' + Date.now();
  s.onerror = function() {
    setSyncStatus('error', 'Showing local data — Sheet sync failed');
  };
  document.body.appendChild(s);
  setTimeout(function() {
    if (document.getElementById('__dawgScript')) {
      setSyncStatus('error', 'Showing local data — Sheet sync failed');
    }
  }, 8000);
}

async function apiCall(payload) {
  await fetch(API_URL, {
    method: 'POST',
    mode: 'no-cors',
    body: JSON.stringify(payload)
  });
}

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function openModal(id = null) {
  editingId = id;
  document.getElementById('modal-title').textContent = id ? 'EDIT STOCK' : 'ADD STOCK';
  if (id) {
    const s = stocks.find(x => x.id === id);
    document.getElementById('f-ticker').value = s.ticker;
    document.getElementById('f-price').value = s.price;
    document.getElementById('f-box-low').value = s.boxLow;
    document.getElementById('f-box-high').value = s.boxHigh;
    document.getElementById('f-slope').value = s.slope;
    document.getElementById('f-thrust-date').value = s.thrustDate;
    document.getElementById('f-next-check').value = s.nextCheck;
    document.getElementById('f-ema').value = s.ema;
    document.getElementById('f-score').value = s.score;
    document.getElementById('f-phase').value = s.phase;
    document.getElementById('f-status').value = s.status;
    document.getElementById('f-notes').value = s.notes;
  } else {
    document.getElementById('f-ticker').value = '';
    document.getElementById('f-price').value = '';
    document.getElementById('f-box-low').value = '';
    document.getElementById('f-box-high').value = '';
    document.getElementById('f-slope').value = '';
    document.getElementById('f-thrust-date').value = '';
    document.getElementById('f-next-check').value = '';
    document.getElementById('f-ema').value = 'above';
    document.getElementById('f-score').value = '3';
    document.getElementById('f-phase').value = '0';
    document.getElementById('f-status').value = 'WATCH';
    document.getElementById('f-notes').value = '';
  }
  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  editingId = null;
}

async function saveStock() {
  const ticker = document.getElementById('f-ticker').value.trim().toUpperCase();
  if (!ticker) { alert('Ticker is required'); return; }

  const stock = {
    id: editingId || Date.now().toString(),
    ticker,
    price: parseFloat(document.getElementById('f-price').value) || 0,
    boxLow: parseFloat(document.getElementById('f-box-low').value) || 0,
    boxHigh: parseFloat(document.getElementById('f-box-high').value) || 0,
    slope: parseFloat(document.getElementById('f-slope').value) || 0,
    thrustDate: document.getElementById('f-thrust-date').value,
    nextCheck: document.getElementById('f-next-check').value,
    ema: document.getElementById('f-ema').value,
    score: parseInt(document.getElementById('f-score').value),
    phase: parseInt(document.getElementById('f-phase').value),
    status: document.getElementById('f-status').value,
    notes: document.getElementById('f-notes').value.trim(),
    updatedAt: new Date().toISOString()
  };

  setSyncStatus('syncing', 'Saving...');
  closeModal();

  if (editingId) {
    stocks = stocks.map(s => s.id === editingId ? stock : s);
  } else {
    stocks.push(stock);
  }
  saveLocal();
  render();

  try {
    await apiCall({ action: 'save', stock });
    setSyncStatus('synced', 'Saved — ' + new Date().toLocaleTimeString());
  } catch(e) {
    setSyncStatus('error', 'Save failed — try again');
  }
}

async function deleteStock(id) {
  if (!confirm('Remove this stock from the tracker?')) return;
  stocks = stocks.filter(s => s.id !== id);
  saveLocal();
  render();
  setSyncStatus('syncing', 'Deleting...');
  try {
    await apiCall({ action: 'delete', id });
    setSyncStatus('synced', 'Deleted — ' + new Date().toLocaleTimeString());
  } catch(e) {
    setSyncStatus('error', 'Delete failed — try again');
  }
}

async function cycleStatus(id) {
  const order = ['WATCH','ALERT','READY','PASS'];
  const s = stocks.find(x => x.id === id);
  s.status = order[(order.indexOf(s.status) + 1) % order.length];
  s.updatedAt = new Date().toISOString();
  saveLocal();
  render();
  setSyncStatus('syncing', 'Saving...');
  try {
    await apiCall({ action: 'save', stock: s });
    setSyncStatus('synced', 'Saved — ' + new Date().toLocaleTimeString());
  } catch(e) {
    setSyncStatus('error', 'Save failed — try again');
  }
}

function formatDate(d) {
  if (!d) return '—';
  const parts = d.split('-');
  if (parts.length < 3) return d;
  return `${parts[1]}/${parts[2]}/${parts[0].slice(2)}`;
}

function slopeColor(v) {
  if (v >= 2.5) return 'green';
  if (v >= 1.8) return 'yellow';
  return 'red';
}

function render() {
  const grid = document.getElementById('cards-grid');
  const filtered = currentFilter === 'ALL' ? stocks : stocks.filter(s => s.status === currentFilter);

  document.getElementById('stat-total').textContent = stocks.length;
  document.getElementById('stat-ready').textContent = stocks.filter(s => s.status === 'READY').length;
  document.getElementById('stat-alert').textContent = stocks.filter(s => s.status === 'ALERT').length;

  if (filtered.length === 0) {
    grid.innerHTML = `<div class="empty-state">
      <div class="big">${currentFilter === 'ALL' ? 'NO STOCKS' : 'NONE ' + currentFilter}</div>
      <p>${currentFilter === 'ALL' ? 'Add your MTT candidates to start tracking' : 'No stocks in this category'}</p>
    </div>`;
    return;
  }

  const order = { READY:0, ALERT:1, WATCH:2, PASS:3 };
  const sorted = [...filtered].sort((a,b) => order[a.status] - order[b.status]);

  grid.innerHTML = sorted.map(s => {
    const phaseStep = parseInt(s.phase) + 1;
    const pips = [1,2,3].map(i => `<div class="score-pip ${i <= parseInt(s.score) ? 'filled' : ''}"></div>`).join('');
    const phaseSegs = [1,2,3,4,5].map(i => `<div class="phase-seg ${i <= phaseStep ? 'active' : ''}"></div>`).join('');
    return `
    <div class="card" data-status="${s.status}">
      <div class="card-header">
        <div>
          <div class="ticker">${s.ticker}</div>
          <div class="price">$${parseFloat(s.price||0).toFixed(2)}</div>
        </div>
        <div style="text-align:right">
          <div class="status-badge status-${s.status}" style="margin-bottom:6px">
            <span class="status-dot dot-${s.status}"></span>${s.status}
          </div>
          <div style="font-family:'Space Mono',monospace;font-size:10px;color:var(--muted)">${s.score}/3 CONVICTION</div>
        </div>
      </div>
      <div class="card-body">
        <div class="metrics-row">
          <div class="metric"><div class="metric-label">BOX LOW</div><div class="metric-value">$${parseFloat(s.boxLow||0).toFixed(2)}</div></div>
          <div class="metric"><div class="metric-label">BOX HIGH</div><div class="metric-value">$${parseFloat(s.boxHigh||0).toFixed(2)}</div></div>
          <div class="metric"><div class="metric-label">20D SLOPE</div><div class="metric-value ${slopeColor(parseFloat(s.slope||0))}">${parseFloat(s.slope||0).toFixed(1)}%</div></div>
        </div>
        <div class="phase-row">
          <div class="phase-label">PHASE</div>
          <div class="phase-track">${phaseSegs}</div>
          <div class="phase-name">${PHASES[parseInt(s.phase||0)]}</div>
        </div>
        <div class="ema-row">
          <span class="ema-tag ${s.ema === 'above' ? 'ema-above' : 'ema-below'}">13 EMA ${s.ema === 'above' ? 'ABOVE ✓' : 'BELOW ✗'}</span>
          <div class="score-display">${pips}</div>
        </div>
        ${s.notes ? `<div class="notes-area">${s.notes}</div>` : ''}
        <div class="dates-row">
          <span>THRUST: ${formatDate(s.thrustDate)}</span>
          <span>CHECK: ${formatDate(s.nextCheck)}</span>
        </div>
      </div>
      <div class="card-actions">
        <button class="btn-action" onclick="cycleStatus('${s.id}')">CYCLE STATUS</button>
        <button class="btn-action" onclick="openModal('${s.id}')">EDIT</button>
        <button class="btn-action danger" onclick="deleteStock('${s.id}')">REMOVE</button>
      </div>
    </div>`;
  }).join('');
}

document.getElementById('modal-overlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

loadStocks();
</script>
</body>
</html>
